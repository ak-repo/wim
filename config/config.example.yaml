server:
  host: 0.0.0.0
  port: 8090

auth:
  access_token_ttl: 720h
  refresh_token_ttl: 2160h

database:
  ssl_mode: disable
  connect_retries: 6
  connect_retry_initial_delay: 1s
  connect_retry_max_delay: 30s

redis:
  db: 0

kafka:
  producer_async: true
  batch_size: 100
  batch_timeout: 100ms
  required_acks: 1
  compression: snappy
  idempotent: true

  min_bytes: 1024
  max_bytes: 10485760
  max_wait: 500ms
  auto_commit: false
  commit_interval: 5s

  enable_sasl: false
  sasl_mechanism: plain
  sasl_username: ""
  sasl_password: ""

  enable_tls: false
  tls_ca_file: ""
  tls_cert_file: ""
  tls_key_file: ""

worker:
  pool_size: 5
  queue_size: 100
  retry_count: 3
  retry_delay: 1s
  batch_size: 10

log_level: info