server:
  host: 0.0.0.0
  port: 8080

database:
  url: ""
  host: localhost
  port: 5432
  user: wim_user
  password: wim_pass
  database: warehouse_inventory
  ssl_mode: disable
  max_conns: 25
  connect_retries: 6
  connect_retry_initial_delay: 1s
  connect_retry_max_delay: 30s

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

kafka:
  brokers:
    - localhost:9092
  topic: warehouse-events
  group_id: warehouse-worker

worker:
  pool_size: 5
  queue_size: 100
  retry_count: 3
  retry_delay: 1s
  batch_size: 10

log_level: info
